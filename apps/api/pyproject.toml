[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
# Real-world claim text from a labeled measurement dataset -- wrapping these
# quoted strings would alter fixture fidelity to the actual collected data.
"tests/generation/relevance_fixtures.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
